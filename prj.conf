# ESP NMEA Bridge application configuration

# Logging
CONFIG_LOG=y
CONFIG_LOG_MODE_DEFERRED=y
CONFIG_LOG_DEFAULT_LEVEL=3
CONFIG_NET_LOG=y

# UART NMEA input
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y

# Board flash: the Waveshare N8 module has 8 MiB. Keep the image header in
# sync so the ROM bootloader validates the flashed image correctly.
CONFIG_ESPTOOLPY_FLASHSIZE_8MB=y

# Runtime heap: ESP-IDF's Wi-Fi stack creates legacy ETS timers dynamically
# while enabling AP+STA. The default ESP Wi-Fi heap add-on is too tight and
# can make esp_timer_create() fail with ESP_ERR_NO_MEM.
CONFIG_HEAP_MEM_POOL_SIZE=98304

# Wi-Fi AP+STA
CONFIG_WIFI=y
CONFIG_WIFI_NM=y
CONFIG_WIFI_ESP32=y
CONFIG_WIFI_USAGE_MODE_STA_AP=y
# Prefer a full STA scan over ESP-IDF fast scan. This mirrors the robust
# client behaviour we expect from the ESP-IDF implementation and avoids
# latching onto the first matching BSSID seen in marginal RF conditions.
CONFIG_ESP32_WIFI_STA_SCAN_ALL=y
# Network core
CONFIG_NETWORKING=y
CONFIG_NET_IPV4=y
CONFIG_NET_IPV6=n
CONFIG_NET_TCP=y
CONFIG_NET_UDP=y
CONFIG_NET_SOCKETS=y
CONFIG_NET_MGMT=y
CONFIG_NET_MGMT_EVENT=y
CONFIG_NET_MGMT_EVENT_INFO=y
CONFIG_NET_MGMT_EVENT_QUEUE_SIZE=16
CONFIG_NET_MGMT_EVENT_STACK_SIZE=4096
CONFIG_NET_CONNECTION_MANAGER=y
CONFIG_NET_CONFIG_AUTO_INIT=n
CONFIG_NET_L2_ETHERNET=y
CONFIG_NET_L2_WIFI_MGMT=y

# IPv4 addressing for AP and STA
CONFIG_NET_DHCPV4=y
CONFIG_NET_DHCPV4_SERVER=y
CONFIG_NET_IF_MAX_IPV4_COUNT=2

# Packet/socket resources for multiple clients and AP+STA
CONFIG_NET_PKT_RX_COUNT=24
CONFIG_NET_PKT_TX_COUNT=24
CONFIG_NET_BUF_RX_COUNT=48
CONFIG_NET_BUF_TX_COUNT=48
CONFIG_NET_SOCKETS_SERVICE_STACK_SIZE=4096
CONFIG_NET_MAX_CONN=16
CONFIG_NET_MAX_CONTEXTS=16

# Application defaults; override credentials in a local overlay, not source.
CONFIG_ESP_NMEA_BRIDGE_AP_ENABLE=y
CONFIG_ESP_NMEA_BRIDGE_STA_ENABLE=y
CONFIG_ESP_NMEA_BRIDGE_TCP_NMEA_SERVER_ENABLE=y
CONFIG_ESP_NMEA_BRIDGE_TCP_NMEA_CLIENT_ENABLE=y
CONFIG_ESP_NMEA_BRIDGE_AP_SSID="ESP-NMEA0183"
CONFIG_ESP_NMEA_BRIDGE_AP_PSK="ChangeMe1234"
CONFIG_ESP_NMEA_BRIDGE_TCP_NMEA_PORT=10110
CONFIG_ESP_NMEA_BRIDGE_TCP_NMEA_SERVER_MAX_CLIENTS=3
CONFIG_ESP_NMEA_BRIDGE_NMEA_FRAME_MAX_LEN=128
CONFIG_ESP_NMEA_BRIDGE_INGEST_QUEUE_DEPTH=32
CONFIG_ESP_NMEA_BRIDGE_SINK_QUEUE_DEPTH=16
CONFIG_ESP_NMEA_BRIDGE_AP_IP_ADDRESS="192.168.4.1"
CONFIG_ESP_NMEA_BRIDGE_AP_NETMASK="255.255.255.0"
